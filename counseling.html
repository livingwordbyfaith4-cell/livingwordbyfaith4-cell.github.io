<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Counseling & Sessions — Living Word By Faith</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', sans-serif; background: #000; color: #fff; }</style>
</head>
<body class="bg-black text-white antialiased">
  <nav class="fixed top-0 left-0 right-0 z-50 h-20 flex items-center px-6 md:px-12 bg-black/70 backdrop-blur-xl border-b border-white/5">
    <div class="max-w-7xl mx-auto w-full flex items-center justify-between">
      <a href="index.html" class="text-sm font-semibold tracking-wider text-[#9AFF00]">LIVING WORD BY FAITH</a>
      <a href="index.html" class="text-sm font-medium text-neutral-400 hover:text-[#9AFF00]">Home</a>
    </div>
  </nav>

  <section class="py-32 px-6 md:px-12 max-w-3xl mx-auto">
    <div class="text-center mb-12">
      <span class="text-xs font-medium tracking-widest uppercase text-[#9AFF00]">Professional Biblical Guidance</span>
      <h1 class="mt-4 text-4xl md:text-5xl font-semibold tracking-tighter">Book a Consultation Session</h1>
    </div>

    <div class="bg-neutral-950 border border-white/5 rounded-2xl p-8 md:p-12">
      <form onsubmit="alert('Consultation request sent successfully! Check your email for next steps.'); event.preventDefault();" class="space-y-6">
        <div>
          <label class="text-xs font-medium text-neutral-400 mb-2 block">Full Name</label>
          <input type="text" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm text-white">
        </div>
        <div>
          <label class="text-xs font-medium text-neutral-400 mb-2 block">Email Address</label>
          <input type="email" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm text-white">
        </div>
        <div>
          <label class="text-xs font-medium text-neutral-400 mb-2 block">Select Session Type</label>
          <select required class="w-full bg-neutral-900 border border-white/10 rounded-xl px-4 py-3 text-sm text-white">
            <option value="">Choose session...</option>
            <option value="virtual">Virtual Session (60 min) — $50</option>
            <option value="inperson">In-Person Session (60 min) — $75</option>
            <option value="free">Free Intro Call (15 min)</option>
          </select>
        </div>
        <button type="submit" class="w-full bg-[#9AFF00] text-black font-medium py-4 rounded-xl hover:bg-[#88e000] transition-all">Confirm Consultation Booking</button>
      </form>
    </div>
  </section>
</body>
</html>
