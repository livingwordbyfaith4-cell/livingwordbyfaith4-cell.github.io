<!DOCTYPE html> 
<html lang="en"> 
<head> 
  <meta charset="UTF-8"> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <title>Share Your Burden — Living Word By Faith</title> 
  <script src="https://tailwindcss.com"></script> 
  <script src="https://iconify.design"></script> 
  <link href="https://googleapis.com" rel="stylesheet"> 
  <style>body { font-family: 'Inter', sans-serif; background: #000; color: #fff; }</style> 
</head> 
<body class="bg-black text-white antialiased"> 
  <nav class="fixed top-0 left-0 right-0 z-50 h-20 flex items-center px-6 md:px-12 bg-black/70 backdrop-blur-xl border-b border-white/5"> 
    <div class="max-w-7xl mx-auto w-full flex items-center justify-between"> 
      <a href="index.html" class="text-sm font-semibold tracking-wider text-[#9AFF00]">LIVING WORD BY FAITH</a> 
      <div class="hidden md:flex items-center gap-8"> 
        <a href="index.html" class="text-sm font-medium text-neutral-400 hover:text-[#9AFF00]">Home</a> 
        <a href="services.html" class="text-sm font-medium text-neutral-400 hover:text-[#9AFF00]">Services</a> 
        <a href="books.html" class="text-sm font-medium text-neutral-400 hover:text-[#9AFF00]">Books</a> 
        <a href="digital-products.html" class="text-sm font-medium text-neutral-400 hover:text-[#9AFF00]">Digital Products</a> 
        <a href="about.html" class="text-sm font-medium text-neutral-400 hover:text-[#9AFF00]">About</a> 
        <!-- CONTACT BUTTON IS GREEN ON THIS PAGE -->
        <a href="contact.html" class="text-sm font-medium text-[#9AFF00]">Contact</a> 
        <a href="counseling.html" class="text-sm font-medium text-neutral-400 hover:text-[#9AFF00]">Counseling</a> 
        <a href="testimonies.html" class="text-sm font-medium text-neutral-400 hover:text-[#9AFF00]">Testimonies</a> 
        <a href="Donation.html" class="text-sm font-medium text-neutral-400 hover:text-[#9AFF00]">Give</a> 
      </div> 
    </div> 
  </nav> 
  <section class="py-32 px-6 md:px-12 max-w-3xl mx-auto"> 
    <div class="text-center mb-12"> 
      <span class="text-xs font-medium tracking-widest uppercase text-[#9AFF00]">Confidential Support</span> 
      <h1 class="mt-4 text-4xl md:text-5xl font-semibold tracking-tighter">You Don't Have to Carry It Alone</h1> 
      <p class="mt-4 text-neutral-400">Share what's on your heart, and our ministry team will lift you up in prayer.</p> 
    </div> 
    <div class="bg-neutral-950 border border-white/5 rounded-2xl p-8 md:p-12"> 
      <form onsubmit="alert('Your burden has been received securely. We are praying for you.'); event.preventDefault();" class="space-y-6"> 
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6"> 
          <div> 
            <label class="text-xs font-medium text-neutral-400 mb-2 block">First Name</label> 
            <input type="text" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm text-white"> 
          </div> 
          <div> 
            <label class="text-xs font-medium text-neutral-400 mb-2 block">Email Address</label> 
            <input type="email" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm text-white"> 
          </div> 
        </div> 
        <div> 
          <label class="text-xs font-medium text-neutral-400 mb-2 block">What area are you struggling with?</label> 
          <select required class="w-full bg-neutral-900 border border-white/10 rounded-xl px-4 py-3 text-sm text-white"> 
            <option value="">Select an area...</option> 
            <option value="marriage">Marriage & Relationships</option> 
            <option value="purpose">Purpose & Direction</option> 
            <option value="spiritual">Spiritual Warfare & Healing</option> 
            <option value="family">Family & Parenting</option> 
            <option value="finances">Financial Stewardship</option> 
          </select> 
        </div> 
        <div> 
          <label class="text-xs font-medium text-neutral-400 mb-2 block">Your Message</label> 
          <textarea required rows="5" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm text-white resize-none" placeholder="Share as much or as little as you're comfortable with..."></textarea> 
        </div> 
        <button type="submit" class="w-full bg-[#9AFF00] text-black font-medium py-4 rounded-xl hover:bg-[#88e000] transition-all">Submit Confidentially</button> 
      </form> 
    </div> 
  </section> 
</body> 
</html>
